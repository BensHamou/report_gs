<div class="modal fade" id="printModal" tabindex="-1" role="dialog" aria-labelledby="printModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="printModalLabel">Imprimer l'Étiquette</h5>
                <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="modal-body print-modal text-center">
                <div id="qr-code-section" class="mb-4">
                    <img id="qr-code-image" src="" alt="QR Code" style="max-width: 40%; height: auto;" crossOrigin="anonymous">
                </div>

                <div class="row">
                    <div class="col-md-6 text-left">
                        <p class="text-muted m-0">Produit:</p>
                        <strong class="text-dark" id="modal-product-name"></strong>
                        <p class="text-muted m-0 mt-2" id="modal-palette-label">N° Palette:</p>
                        <strong class="text-dark" id="modal-palette-sequence"></strong>
                    </div>
                    <div class="col-md-6 text-left">
                        <p class="text-muted m-0">Date Expiration:</p>
                        <strong class="text-dark" id="modal-expiry-date"></strong>
                        <p class="text-muted m-0 mt-2">Date Production:</p>
                        <strong class="text-dark" id="modal-production-date"></strong>
                    </div>
                    <div class="col-md-6 text-left mt-5">
                        <p class="text-muted m-0">N° Lot:</p>
                        <strong class="text-dark" id="modal-lot-number"></strong>
                        <p class="text-muted m-0 mt-1">Shift:</p>
                        <strong class="text-dark" id="modal-shift"></strong>
                    </div>
                    <div class="col-md-3 text-left mt-5">
                        <p class="text-muted m-0">Magasin:</p>
                        <strong class="text-dark" id="modal-magasin"></strong>
                    </div>
                    <div class="col-md-3 text-left mt-5">
                        <p class="text-muted m-0">Emplacement:</p>
                        <strong class="text-dark" id="modal-emplacement"></strong>
                    </div>
                </div>
            </div>
            <div class="row text-center">
                <div class="mt-5 mb-2" id="ticket-count-container">
                    <label for="ticket-count">Nombre d'étiquettes:</label>
                    <input type="number" id="ticket-count" class="form-control w-50 mx-auto" min="1">
                </div>
                <div class="mt-2">
                    <label for="small-version-checkbox">Utiliser la petite version :</label>
                    <input type="checkbox" id="small-version-checkbox">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                <button type="button" class="btn btn-primary" id="print-button">Imprimer</button>
            </div>
        </div>
    </div>
</div>

<script>
    function extractPaletteSequence(code) {
        if (!code) return '/';
        const parts = code.split(';');
        for (let part of parts) {
            if (part.startsWith('PAL:')) {
                return part.split(':')[1];
            }
        }
        return '/';
    }

    document.getElementById('printModal').addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const modal = this;
    
        modal.querySelector('#modal-product-name').textContent = button.getAttribute('data-product-name');
        modal.querySelector('#modal-lot-number').textContent = button.getAttribute('data-lot-number');
        modal.querySelector('#modal-expiry-date').textContent = button.getAttribute('data-expiry-date');
        modal.querySelector('#modal-production-date').textContent = button.getAttribute('data-production-date');
        modal.querySelector('#modal-magasin').textContent = button.getAttribute('data-magasin');
        modal.querySelector('#modal-shift').textContent = button.getAttribute('data-shift');
        modal.querySelector('#modal-emplacement').textContent = button.getAttribute('data-emplacement');
    
        const code = button.getAttribute('data-code') || '';
        const sequenceAttr = button.getAttribute('data-sequence');
        let sequence = '/';
        if (sequenceAttr) {
            sequence = sequenceAttr;
        } else if (code) {
            sequence = extractPaletteSequence(code);
        }
        modal.querySelector('#modal-palette-sequence').textContent = sequence;

        const isMp = button.getAttribute('data-is-mp') === '1';
        
        if (isMp) {
            modal.querySelector('#modal-palette-label').style.display = 'none';
            modal.querySelector('#modal-palette-sequence').style.display = 'none';
        } else {
            modal.querySelector('#modal-palette-label').style.display = 'block';
            modal.querySelector('#modal-palette-sequence').style.display = 'block';
        }

        const isBulk = button.getAttribute('data-is-bulk') === '1';
        const fromMoveDetail = button.getAttribute('data-from-move-detail') === '1';
    
        const ticketCountContainer = modal.querySelector('#ticket-count-container');
        const ticketCountInput = modal.querySelector('#ticket-count');
    
        modal.setAttribute('data-current-is-bulk', isBulk ? '1' : '0');
        modal.setAttribute('data-current-is-mp', isMp ? '1' : '0');
        modal.setAttribute('data-current-from-move-detail', fromMoveDetail ? '1' : '0');
        modal.setAttribute('data-current-detail-id', button.getAttribute('data-line-detail-id') || '');
        modal.setAttribute('data-current-use-dc', button.getAttribute('data-use-dc') || '0');
        modal.setAttribute('data-current-use-dl', button.getAttribute('data-use-dl') || '0');
    
        if (isBulk && !isMp) {
            ticketCountContainer.style.display = 'none';
            ticketCountInput.value = 1;
            ticketCountInput.disabled = true;
            modal.setAttribute('data-current-detail-codes', button.getAttribute('data-detail-codes') || '[]');
        } else {
            ticketCountContainer.style.display = 'block';
            if (isMp) {
                ticketCountInput.disabled = false;
                ticketCountInput.value = button.getAttribute('data-palettes') || 1;
                if (isBulk) {
                    modal.setAttribute('data-current-detail-codes', button.getAttribute('data-detail-codes') || '[]');
                }
            } else {
                ticketCountInput.disabled = true;
                ticketCountInput.value = 1;
            }
        }
    
        const detailId = button.getAttribute('data-line-detail-id');
        const useDc = button.getAttribute('data-use-dc');
        const useDl = button.getAttribute('data-use-dl');
        const qrCodeImg = modal.querySelector('#qr-code-image');
        if (isBulk) {
            const codesStr = button.getAttribute('data-detail-codes') || '[]';
            try {
                const codes = JSON.parse(codesStr);
                if (codes.length > 0) {
                    qrCodeImg.src = `/generate-qr-code/${codes[0].id}/?use_dc=1`;
                } else {
                    qrCodeImg.src = '';
                }
            } catch(e) {
                qrCodeImg.src = '';
            }
        } else {
            if (useDc === '1') {
                qrCodeImg.src = `/generate-qr-code/${detailId}/?use_dc=1`;
            } else if (useDl === '1') {
                qrCodeImg.src = `/generate-qr-code/${detailId}/?use_dl=1`;
            } else {
                qrCodeImg.src = `/generate-qr-code/${detailId}/`;
            }
        }
    });

    document.getElementById('print-button').addEventListener('click', function () {
        const modal = document.getElementById('printModal');
        const isBulk = modal.getAttribute('data-current-is-bulk') === '1';
        const isMp = modal.getAttribute('data-current-is-mp') === '1';
        const fromMoveDetail = modal.getAttribute('data-current-from-move-detail') === '1';
        const detailId = modal.getAttribute('data-current-detail-id');
        const useDc = modal.getAttribute('data-current-use-dc');
        const useDl = modal.getAttribute('data-current-use-dl');
        const ticketCount = parseInt(document.getElementById('ticket-count').value) || 1;
        const use_small_modal = document.getElementById('small-version-checkbox').checked;
        
        let itemsToPrint = [];
        
        if (isBulk && !isMp) {
            const codesStr = modal.getAttribute('data-current-detail-codes') || '[]';
            try {
                const codes = JSON.parse(codesStr);
                codes.forEach(c => {
                    itemsToPrint.push({
                        qrUrl: `/generate-qr-code/${c.id}/?use_dc=1`,
                        productName: modal.querySelector('#modal-product-name').textContent,
                        lotNumber: modal.querySelector('#modal-lot-number').textContent,
                        expiryDate: modal.querySelector('#modal-expiry-date').textContent,
                        productionDate: modal.querySelector('#modal-production-date').textContent,
                        magasin: modal.querySelector('#modal-magasin').textContent,
                        emplacement: modal.querySelector('#modal-emplacement').textContent,
                        shift: modal.querySelector('#modal-shift').textContent,
                        ticketCount: 1,
                        sequence: extractPaletteSequence(c.code)
                    });
                });
            } catch (e) {
                alert("Erreur lors de la préparation des codes.");
                return;
            }
        } else {
            const qrCodeImage = modal.querySelector('#qr-code-image');
            itemsToPrint.push({
                qrUrl: qrCodeImage.src,
                productName: modal.querySelector('#modal-product-name').textContent,
                lotNumber: modal.querySelector('#modal-lot-number').textContent,
                expiryDate: modal.querySelector('#modal-expiry-date').textContent,
                productionDate: modal.querySelector('#modal-production-date').textContent,
                magasin: modal.querySelector('#modal-magasin').textContent,
                emplacement: modal.querySelector('#modal-emplacement').textContent,
                shift: modal.querySelector('#modal-shift').textContent,
                ticketCount: ticketCount,
                sequence: modal.querySelector('#modal-palette-sequence').textContent
            });
        }
        
        if (itemsToPrint.length === 0) {
            alert("Aucun code à imprimer.");
            return;
        }
        
        const loadBase64 = (url) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = url;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const context = canvas.getContext('2d');
                    context.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => reject(new Error("Failed to load image " + url));
            });
        };
        
        Promise.all(itemsToPrint.map(item => loadBase64(item.qrUrl)))
            .then(base64Images => {
                const printWindow = window.open('', '_blank');
                if (!printWindow) {
                    alert("Veuillez autoriser les popups pour imprimer.");
                    return;
                }
                
                let printContent = '';
                base64Images.forEach((base64Image, idx) => {
                    const item = itemsToPrint[idx];
                    
                    const small_content = `
                    <div style="margin: 1cm;">
                        <div class="label">
                            <img src="${base64Image}" alt="QR Code">
                            <div class="product-name">${item.productName} ${isMp ? '' : `(Palette N° ${item.sequence})`}</div>
                        </div>
                    </div>`;
                    
                    const big_content = `
                    <div style="page-break-after: always; width: 142mm; height: 208mm; display: flex; flex-direction: column; justify-content: flex-start; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 2mm 0;">
                        <div class="fixed-header" style="font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; padding: 6px 12px; width: 100%; box-sizing: border-box; border: 2px solid #000; border-bottom: none; background-color: #f5f5f5;">
                            <span>grupopuma Algérie</span>
                            <span>${isMp ? '' : `Palette N° ${item.sequence}`}</span>
                        </div>
                        <table style="width: 100%; height: calc(100% - 35px); border-collapse: collapse; border: 2px solid #000; border-top: none; box-sizing: border-box;">
                            <tr style="height: 25%;">
                                <td style="text-align: center; vertical-align: middle; border: 2px solid #000; border-top: none; padding: 8px;">
                                    <img src="${base64Image}" alt="QR Code" style="max-height: 100%; max-width: 60%; width: auto; height: auto; display: inline-block;">
                                </td>
                            </tr>
                            <tr style="height: 75%;">
                                <td style="border: none; padding: 0;">
                                    <table style="width: 100%; height: 100%; border-collapse: collapse;">
                                        <tr style="height: 66%;">
                                            <td style="text-align: left; width: 50%; vertical-align: middle; border: 2px solid #000; border-left: none; border-bottom: none; padding: 10px;">
                                                <div style="font-size: 13px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 6px; letter-spacing: 0.5px;">Produit:</div>
                                                <div style="font-size: 20px; font-weight: bold; color: #000; line-height: 1.2;">${item.productName}</div>
                                            </td>
                                            <td style="text-align: left; vertical-align: middle; border: 2px solid #000; border-right: none; border-bottom: none; padding: 10px;" colspan="2">
                                                <div style="margin-bottom: 10px;">
                                                    <div style="font-size: 13px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 4px; letter-spacing: 0.5px;">Date d'expiration:</div>
                                                    <div style="font-size: 20px; font-weight: bold; color: #000;">${item.expiryDate}</div>
                                                </div>
                                                <div>
                                                    <div style="font-size: 13px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 4px; letter-spacing: 0.5px;">Date de production:</div>
                                                    <div style="font-size: 20px; font-weight: bold; color: #000;">${item.productionDate}</div>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr style="height: 34%;">
                                            <td style="text-align: left; width: 50%; vertical-align: middle; border: 2px solid #000; border-left: none; border-bottom: none; padding: 10px;">
                                                <div style="margin-bottom: 6px;">
                                                    <div style="font-size: 13px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 4px; letter-spacing: 0.5px;">N° Lot:</div>
                                                    <div style="font-size: 22px; font-weight: bold; color: #000;">${item.lotNumber}</div>
                                                </div>
                                                <div>
                                                    <div style="font-size: 13px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 4px; letter-spacing: 0.5px;">Shift:</div>
                                                    <div style="font-size: 22px; font-weight: bold; color: #000;">${item.shift}</div>
                                                </div>
                                            </td>
                                            <td style="text-align: left; vertical-align: middle; border: 2px solid #000; border-bottom: none; width: 25%; padding: 10px;">
                                                <div style="font-size: 13px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 6px; letter-spacing: 0.5px;">Magasin:</div>
                                                <div style="font-size: 20px; font-weight: bold; color: #000; line-height: 1.2;">${item.magasin}</div>
                                            </td>
                                            <td style="text-align: left; vertical-align: middle; border: 2px solid #000; border-right: none; border-bottom: none; width: 25%; padding: 10px;">
                                                <div style="font-size: 13px; text-transform: uppercase; color: #555; font-weight: bold; margin-bottom: 6px; letter-spacing: 0.5px;">Emplacement:</div>
                                                <div style="font-size: 20px; font-weight: bold; color: #000; line-height: 1.2;">${item.emplacement}</div>
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>
                    </div>`;
                    
                    for (let i = 0; i < item.ticketCount; i++) {
                        printContent += use_small_modal ? small_content : big_content;
                    }
                });
                
                const finalHtml = `
                <html>
                    <head>
                        <title>Étiquettes de Palettes</title>
                        <style>
                            ${use_small_modal ? `
                            @page {
                                size: 50cm 40cm;
                                margin: 0;
                            }
                            body {
                                margin: 0;
                                padding: 0;
                                width: 50cm;
                                height: 40cm;
                                font-family: Arial, sans-serif;
                            }
                            .label {
                                width: 48cm;
                                height: 37cm;
                                display: flex;
                                flex-direction: column;
                                justify-content: center;
                                align-items: center;
                                border: 1px solid #ccc;
                                page-break-after: always;
                            }
                            img {
                                width: 85%;
                                height: 85%;
                                object-fit: contain;
                                margin-bottom: 10px;
                            }
                            .product-name {
                                font-size: 2.5rem;
                                font-weight: bold;
                                text-align: center;
                            }
                            ` : `
                            @page { size: 142mm 210mm; margin: 0; }
                            body { margin: 0; padding: 0; width: 142mm; height: 210mm; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
                            table { width: 100%; height: 100%; border-collapse: collapse; }
                            * { padding: 0; margin: 0; box-sizing: border-box; }
                            td { border: 2px solid #000; }
                            .fixed-header {
                                font-size: 12pt;
                                font-weight: bold;
                                text-align: left;
                                width: 100%;
                                border: 2px solid #000;
                                border-bottom: none;
                            }
                            `}
                        </style>
                    </head>
                    <body>
                        ${printContent}
                    </body>
                </html>`;
                
                printWindow.document.open();
                printWindow.document.write(finalHtml);
                printWindow.document.close();
                
                setTimeout(() => {
                    printWindow.print();
                    printWindow.onafterprint = () => printWindow.close();
                    
                    let markUrl = '';
                    if (isBulk) {
                        markUrl = `/mark-printed/${detailId}/`;
                    } else if (useDc === '1') {
                        markUrl = `/mark-printed/${detailId}/?use_dc=1`;
                    } else if (useDl === '1') {
                        markUrl = `/mark-printed/${detailId}/?use_dl=1`;
                    } else {
                        markUrl = `/mark-printed/${detailId}/`;
                    }
                    
                    $.ajax({
                        url: markUrl,
                        type: 'GET',
                        success: function() {
                            location.reload();
                        }
                    });
                }, 500);
            })
            .catch(err => {
                alert("Erreur lors du chargement des images QR. Veuillez réessayer.");
                console.error(err);
            });
    });
</script>
